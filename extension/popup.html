<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Inter', -apple-system, sans-serif; width: 280px; padding: 16px; background: #161b25; color: #e8eaf0; margin: 0; }
    h2 { margin: 0 0 16px 0; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .badge { background: #fe2c55; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
    .stat { background: #1e2535; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 16px; border: 1px solid #2a3246; }
    .stat-num { font-size: 24px; font-weight: bold; color: #25f4ee; margin-top: 4px; }
    .btn { display: block; width: 100%; padding: 10px; margin-bottom: 10px; background: #fe2c55; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { background: #3a4256; cursor: not-allowed; opacity: 0.5; }
    .btn.stop { background: #3a4256; }
    .btn.dash { background: transparent; border: 1px solid #fe2c55; color: #fe2c55; }
    .btn.dash:hover { background: rgba(254,44,85,0.1); }
    .error { color: #ff6b35; font-size: 12px; margin-bottom: 12px; text-align: center; }
  </style>
</head>
<body>
  <h2><span class="badge">v4.0</span> 抖音数据看板</h2>
  <div id="status" class="error" style="display:none;">请先打开抖音创作者主页 (douyin.com/user/...)</div>
  
  <div class="stat">
    <div style="font-size: 12px; color: #7a85a0;">本次运行新抓取视频</div>
    <div class="stat-num" id="count">0</div>
  </div>

  <button id="btnStart" class="btn">自动向下滚动采集</button>
  <button id="btnStop" class="btn stop" style="display:none;">停止采集</button>
  <button id="btnDash" class="btn dash">打开数据看板 (Dashboard)</button>

  <script src="popup.js"></script>
</body>
</html>
